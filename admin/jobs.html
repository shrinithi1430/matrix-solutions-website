<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Jobs | Matrix HR Admin</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo" style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">
                <div style="width: 40px; height: 40px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px;">M</div>
                <h2 style="font-size: 22px; color: white;">Matrix HR</h2>
            </div>
            
            <nav>
                <ul class="nav-list">
                    <li class="nav-item"><a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></a></li>
                    <li class="nav-item"><a href="jobs.html" class="nav-link active"><i data-lucide="briefcase"></i><span>All Jobs</span></a></li>
                    <li class="nav-item"><a href="create-job.html" class="nav-link"><i data-lucide="plus-circle"></i><span>Create Job</span></a></li>
                    <li class="nav-item"><a href="#" class="nav-link"><i data-lucide="bar-chart-3"></i><span>Analytics</span></a></li>
                    <li class="nav-item"><a href="#" class="nav-link"><i data-lucide="settings"></i><span>Settings</span></a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <div class="search-bar" style="position: relative;">
                        <i data-lucide="search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 18px; color: var(--text-muted);"></i>
                        <input type="text" class="form-control" placeholder="Search jobs..." style="padding-left: 40px; width: 300px; background: #f1f5f9; border: none;">
                    </div>
                </div>
                <div class="header-right">
                    <div class="admin-profile" style="display: flex; align-items: center; gap: 0.75rem;">
                        <div style="text-align: right;">
                            <p style="font-size: 14px; font-weight: 700;">Kesav</p>
                            <a href="login.html" style="font-size: 11px; color: var(--danger); text-decoration: none;">Logout</a>
                        </div>
                        <img src="https://ui-avatars.com/api/?name=Kesav&background=008080&color=fff" style="width: 45px; border-radius: 12px;">
                    </div>
                </div>
            </header>

            <div class="page-container animate-fade-in">
                <div class="section-header">
                    <div>
                        <h1 class="section-title">All Job Postings</h1>
                        <p style="color: var(--text-muted);">Manage and track all your active and inactive job listings.</p>
                    </div>
                    <a href="create-job.html" class="btn btn-primary"><i data-lucide="plus-circle"></i> Create New</a>
                </div>

                <div style="display: flex; gap: 10px; margin-bottom: 2rem;">
                    <button class="btn btn-primary" style="padding: 6px 15px; font-size: 13px;">All Jobs</button>
                    <button class="btn btn-outline" style="padding: 6px 15px; font-size: 13px;">Active</button>
                    <button class="btn btn-outline" style="padding: 6px 15px; font-size: 13px;">Draft</button>
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <thead>
                            <tr style="text-align: left; background: #f8fafc; border-bottom: 1px solid var(--border-color);">
                                <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 13px; font-weight: 700;">Job Info</th>
                                <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 13px; font-weight: 700;">Applicants</th>
                                <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 13px; font-weight: 700;">Status</th>
                                <th style="padding: 1.25rem 1.5rem; color: var(--text-muted); font-size: 13px; font-weight: 700;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="jobs-list-body">
                            <!-- Data will be loaded from backend -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script>
        lucide.createIcons();

        async function fetchJobs() {
            const tableBody = document.getElementById('jobs-list-body');
            tableBody.innerHTML = '<tr><td colspan="4" style="padding: 2rem; text-align: center;">Loading jobs...</td></tr>';
            
            try {
                const response = await fetch('https://matrix-solution-server.onrender.com/api/jobs');
                const result = await response.json();
                
                if (result.success && result.data.length > 0) {
                    tableBody.innerHTML = result.data.map(job => `
                        <tr style="border-bottom: 1px solid #f1f5f9;">
                            <td style="padding: 1.25rem 1.5rem;">
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <div style="width: 40px; height: 40px; background: #f1f5f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                                        ${job.posterImage ? `<img src="${job.posterImage}" style="width: 100%; height: 100%; object-fit: cover;">` : `<i data-lucide="briefcase" style="width: 20px; color: #94a3b8;"></i>`}
                                    </div>
                                    <div>
                                        <div style="font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px;">
                                            ${job.title}
                                            ${job.isUrgent ? `<span style="background: #fee2e2; color: #ef4444; font-size: 10px; padding: 2px 6px; border-radius: 4px;">URGENT</span>` : ''}
                                            ${job.isFeatured ? `<span style="background: #fef3c7; color: #d97706; font-size: 10px; padding: 2px 6px; border-radius: 4px;">FEATURED</span>` : ''}
                                        </div>
                                        <div style="font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 10px; margin-top: 4px;">
                                            <span>${job.company}</span>
                                            <span style="width: 4px; height: 4px; background: #cbd5e1; border-radius: 50%;"></span>
                                            <span style="display: flex; align-items: center; gap: 4px;"><i data-lucide="map-pin" style="width: 12px;"></i> ${job.location || 'N/A'}</span>
                                            <span style="width: 4px; height: 4px; background: #cbd5e1; border-radius: 50%;"></span>
                                            <span style="display: flex; align-items: center; gap: 4px;"><i data-lucide="clock" style="width: 12px;"></i> ${job.jobType || 'Full Time'}</span>
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td style="padding: 1.25rem 1.5rem;">
                                <div style="font-weight: 600;">${job.applicants || 0}</div>
                                <div style="font-size: 11px; color: var(--text-muted);">Applications</div>
                            </td>
                            <td style="padding: 1.25rem 1.5rem;">
                                <span style="background: ${job.isActive ? '#dcfce7' : '#fee2e2'}; color: ${job.isActive ? '#166534' : '#991b1b'}; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 700;">
                                    ${job.isActive ? 'Active' : 'Inactive'}
                                </span>
                            </td>
                            <td style="padding: 1.25rem 1.5rem;">
                                <div style="display: flex; gap: 10px;">
                                    <button class="btn btn-ghost" style="padding: 8px; background: #f8fafc;"><i data-lucide="edit" style="width: 16px;"></i></button>
                                    <button class="btn btn-ghost" onclick="deleteJob('${job._id}')" style="padding: 8px; background: #f8fafc;"><i data-lucide="trash2" style="width: 16px; color: var(--danger);"></i></button>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                    lucide.createIcons();
                } else {
                    tableBody.innerHTML = '<tr><td colspan="4" style="padding: 2rem; text-align: center;">No jobs found.</td></tr>';
                }
            } catch (error) {
                tableBody.innerHTML = '<tr><td colspan="4" style="padding: 2rem; text-align: center; color: var(--danger);">Failed to load jobs. Make sure backend is running.</td></tr>';
            }
        }

        async function deleteJob(id) {
            if (!confirm('Are you sure you want to delete this job?')) return;
            try {
                await fetch(`https://matrix-solution-server.onrender.com/api/jobs/${id}`, { method: 'DELETE' });
                fetchJobs();
            } catch (error) {
                alert('Error deleting job');
            }
        }

        fetchJobs();
    </script>
</body>
</html>
